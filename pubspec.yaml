name: audio_player_app
description: Secure Flutter Audio Player with Firebase & Biometric Auth
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.3
  cloud_firestore: ^4.15.5

  # Biometric Auth

  # Audio (just_audio only - no background service)
  just_audio: ^0.9.36

  # Reactive streams
  rxdart: ^0.27.7

  # State Management
  provider: ^6.1.2

  # HTTP / API
  dio: ^5.4.1
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.67.0

  # UI / UX
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/animations/
